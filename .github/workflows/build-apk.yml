name: Build Backrooms APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto Android
        run: unzip -o BackroomsNoClip-Android.zip

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Compilar APK
        working-directory: BackroomsNoClip-Android
        run: gradle --no-daemon :app:assembleDebug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: backrooms-noclip-apk
          path: BackroomsNoClip-Android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
