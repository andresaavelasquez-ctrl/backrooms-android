name: Build Backrooms Offline APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
      - "README.md"

permissions:
  contents: read

jobs:
  build:
    name: Compilar APK offline
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          yes | sdkmanager --licenses >/dev/null || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Comprobar archivos locales
        run: |
          test -f mobile/app/src/main/assets/game/index.html
          test -f mobile/app/src/main/assets/game/js/net/local.js
          test -f mobile/app/src/main/assets/UPSTREAM-LICENSE.md

          echo "Tamaño del juego incluido:"
          du -sh mobile/app/src/main/assets/game

      - name: Aplicar integración móvil
        run: |
          bash mobile/prepare-web.sh

      - name: Validar JavaScript
        run: |
          node --check mobile/native-mobile.js
          node --check mobile/app/src/main/assets/game/js/native-mobile.js
          node --check mobile/app/src/main/assets/game/js/net/local.js

      - name: Verificar funcionamiento offline
        run: |
          if grep -Eq \
            '<uses-permission[^>]+android.permission.INTERNET' \
            mobile/app/src/main/AndroidManifest.xml
          then
            echo "ERROR: AndroidManifest solicita Internet."
            exit 1
          fi

          grep -q \
            'setBlockNetworkLoads(true)' \
            mobile/app/src/main/java/com/andresaavelasquez/backrooms/MainActivity.java

          grep -q \
            'window.MODO_LOCAL = true' \
            mobile/native-mobile.js

      - name: Compilar APK
        run: |
          gradle \
            --no-daemon \
            --stacktrace \
            -p mobile \
            :app:assembleDebug

      - name: Verificar APK generado
        run: |
          APK="mobile/app/build/outputs/apk/debug/app-debug.apk"
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"

          test -f "$APK"

          "$AAPT" dump permissions "$APK" | tee permissions.txt

          if grep -q "android.permission.INTERNET" permissions.txt
          then
            echo "ERROR: El APK solicita permiso de Internet."
            exit 1
          fi

          echo "APK generado correctamente:"
          ls -lh "$APK"

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: backrooms-noclip-offline-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
