plugins {
    id 'com.android.application'
}

android {
    namespace 'com.andresaavelasquez.backrooms'
    compileSdk 36

    defaultConfig {
        applicationId 'com.andresaavelasquez.backrooms'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName '1.0.0-offline'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    androidResources {
        noCompress 'mp3', 'wav', 'webp', 'png', 'ttf'
    }
}
